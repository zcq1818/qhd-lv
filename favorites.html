<script>
window.addEventListener('scroll',function(){document.getElementById('navbar').classList.toggle('scrolled',window.scrollY>20);});
document.getElementById('hamburger').addEventListener('click',function(){document.getElementById('navLinks').classList.toggle('open');});
// 移动端：点击导航链接后自动关闭菜单
var _navLinksEl = document.getElementById('navLinks');
if (_navLinksEl) {
  _navLinksEl.addEventListener('click', function (e) {
    if (e.target.tagName === 'A' || e.target.closest('a')) {
      this.classList.remove('open');
    }
  });
}

function clearAllFavorites() {
  if (!confirm('确定要清空所有收藏吗？此操作不可撤销。')) return;
  try {
    localStorage.removeItem('qhd_favorites');
    localStorage.removeItem('qhd_fav_names');
  } catch (e) {}
  if (window.QHDUser) {
    window.QHDUser.renderFavoritesPage();
    window.QHDUser.flashToast('已清空所有收藏');
  }
}
