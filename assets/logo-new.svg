<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0c4a6e"/>
      <stop offset="100%" stop-color="#082f49"/>
    </linearGradient>
    <linearGradient id="wallGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="wave1Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="wave2Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect x="4" y="4" width="112" height="112" rx="28" fill="url(#bgGrad)"/>

  <!-- 长城（从海中升起） -->
  <g>
    <path d="M20 58 L20 48 L28 48 L28 40 L36 40 L36 48 L44 48 L44 40 L52 40 L52 48 L60 48 L60 40 L68 40 L68 48 L76 48 L76 40 L84 40 L84 48 L92 48 L92 40 L100 40 L100 48 L100 58 Z" fill="url(#wallGrad)"/>
    <rect x="54" y="28" width="12" height="12" rx="1" fill="url(#wallGrad)"/>
    <rect x="57" y="20" width="6" height="8" rx="0.5" fill="url(#wallGrad)"/>
  </g>

  <!-- 海浪（两层渐变） -->
  <path d="M8 58 Q22 52 36 58 T64 58 T92 58 T114 58 L114 74 L8 74 Z" fill="url(#wave1Grad)"/>
  <path d="M6 74 Q20 68 34 74 T62 74 T90 74 T114 74 L114 96 L6 96 Z" fill="url(#wave2Grad)"/>

  <!-- 浪花 -->
  <g fill="none" stroke="#ffffff" stroke-linecap="round" opacity="0.6">
    <path d="M14 58 Q24 54 34 58 T54 58 T74 58 T94 58" stroke-width="1.5"/>
    <path d="M12 74 Q22 70 32 74 T52 74 T72 74 T92 74 T110 74" stroke-width="1.5"/>
  </g>
</svg>
