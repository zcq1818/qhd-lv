<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <!-- 日出渐变：红→金 -->
    <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fef08a"/>
      <stop offset="40%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f97316"/>
    </radialGradient>
    <!-- 海洋渐变：深蓝→青 -->
    <linearGradient id="seaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0c4a6e"/>
    </linearGradient>
    <!-- 长城渐变：暖金→红 -->
    <linearGradient id="wallGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <!-- 背景渐变：天蓝→海蓝 -->
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="50%" stop-color="#0c4a6e"/>
      <stop offset="100%" stop-color="#082f49"/>
    </linearGradient>
    <!-- 沙滩金色 -->
    <linearGradient id="sandGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- 圆角背景 -->
  <rect x="4" y="4" width="112" height="112" rx="28" fill="url(#skyGrad)"/>

  <!-- 旭日（鸽子窝日出） -->
  <circle cx="60" cy="38" r="18" fill="url(#sunGrad)"/>
  <!-- 日光放射 -->
  <g stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round" opacity="0.5">
    <line x1="60" y1="10" x2="60" y2="4"/>
    <line x1="38" y1="22" x2="33" y2="17"/>
    <line x1="82" y1="22" x2="87" y2="17"/>
    <line x1="28" y1="38" x2="22" y2="38"/>
    <line x1="92" y1="38" x2="98" y2="38"/>
  </g>

  <!-- 日落海面反光 -->
  <ellipse cx="60" cy="56" rx="22" ry="3" fill="#fbbf24" opacity="0.25"/>

  <!-- 长城（老龙头入海处） -->
  <g>
    <!-- 城墙锯齿轮廓 -->
    <path d="M16 52 L16 44 L22 44 L22 38 L28 38 L28 44 L34 44 L34 38 L40 38 L40 44 L46 44 L46 38 L52 38 L52 44 L58 44 L58 38 L64 38 L64 44 L70 44 L70 38 L76 38 L76 44 L82 44 L82 38 L88 38 L88 44 L94 44 L94 38 L100 38 L100 44 L106 44 L106 52 Z"
          fill="url(#wallGrad)"/>
    <!-- 城楼 -->
    <rect x="54" y="28" width="14" height="10" rx="1" fill="url(#wallGrad)"/>
    <rect x="56" y="22" width="10" height="6" rx="0.5" fill="url(#wallGrad)"/>
    <!-- 城楼门窗 -->
    <rect x="59" y="31" width="4" height="7" rx="0.5" fill="#7c2d12" opacity="0.6"/>
  </g>

  <!-- 多彩海浪（三层） -->
  <!-- 第一层：浅青色 -->
  <path d="M10 64 Q24 58 38 64 T66 64 T94 64 T114 64 L114 74 L10 74 Z" fill="#06b6d4" opacity="0.7"/>
  <!-- 第二层：海蓝色 -->
  <path d="M8 74 Q22 68 36 74 T64 74 T92 74 T114 74 L114 84 L8 84 Z" fill="#0ea5e9" opacity="0.85"/>
  <!-- 第三层：深蓝 -->
  <path d="M6 84 Q20 78 34 84 T62 84 T90 84 T114 84 L114 96 L6 96 Z" fill="url(#seaGrad)"/>

  <!-- 海浪白色浪花 -->
  <g fill="none" stroke="#ffffff" stroke-linecap="round" opacity="0.7">
    <path d="M16 64 Q24 60 32 64 T48 64 T64 64 T80 64 T96 64" stroke-width="1.5"/>
    <path d="M14 74 Q24 70 34 74 T54 74 T74 74 T94 74 T110 74" stroke-width="1.5"/>
  </g>

  <!-- 金色沙滩 -->
  <path d="M6 96 Q30 92 60 96 T114 96 L114 106 Q90 110 60 106 T6 106 Z" fill="url(#sandGrad)"/>

  <!-- 沙滩纹理点 -->
  <g fill="#b45309" opacity="0.2">
    <circle cx="28" cy="102" r="1"/>
    <circle cx="52" cy="104" r="1"/>
    <circle cx="76" cy="101" r="1"/>
    <circle cx="92" cy="103" r="1"/>
  </g>
</svg>
