<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="logoBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d47a1"/>
      <stop offset="50%" stop-color="#1a73e8"/>
      <stop offset="100%" stop-color="#4a9af5"/>
    </linearGradient>
    <linearGradient id="logoWave" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e3f2fd" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- 圆角背景 -->
  <rect x="4" y="4" width="112" height="112" rx="28" fill="url(#logoBg)"/>

  <!-- 装饰光晕 -->
  <circle cx="85" cy="30" r="30" fill="#ffffff" opacity="0.08"/>

  <!-- 长城轮廓（老龙头 - 长城入海处） -->
  <g fill="#ffffff">
    <!-- 城墙主体 -->
    <path d="M28 52 L28 42 L34 42 L34 36 L40 36 L40 42 L48 42 L48 36 L54 36 L54 42 L62 42 L62 36 L68 36 L68 42 L76 42 L76 36 L82 36 L82 42 L88 42 L88 52 Z"/>
    <!-- 城楼 -->
    <rect x="56" y="26" width="12" height="10" rx="1"/>
    <rect x="58" y="20" width="8" height="6" rx="1"/>
    <!-- 城楼窗户 -->
    <rect x="60" y="29" width="4" height="6" rx="0.5" fill="#1a73e8" opacity="0.4"/>
  </g>

  <!-- 海浪（渤海） -->
  <g fill="none" stroke="#ffffff" stroke-linecap="round">
    <!-- 第一层浪 -->
    <path d="M20 68 Q30 62 40 68 T60 68 T80 68 T100 68" stroke-width="2.5" opacity="0.5"/>
    <!-- 第二层浪 -->
    <path d="M16 80 Q28 74 40 80 T64 80 T88 80 T104 80" stroke-width="3" opacity="0.7"/>
    <!-- 第三层浪 -->
    <path d="M12 92 Q26 86 40 92 T68 92 T96 92 T108 92" stroke-width="3.5" opacity="0.9"/>
  </g>

  <!-- 海面反光 -->
  <g fill="#ffffff" opacity="0.15">
    <ellipse cx="40" cy="86" rx="18" ry="2"/>
    <ellipse cx="75" cy="82" rx="14" ry="1.5"/>
  </g>
</svg>
